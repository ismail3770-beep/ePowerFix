# ─── ePowerFix CI/CD Pipeline ─────────────────────────────────────────────────
# Runs on every push to main + all PRs targeting main.
# Stages: install → lint → typecheck → test → build → deploy (staging only)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL        — PostgreSQL connection string for CI test DB
#   JWT_SECRET          — Test JWT secret (min 32 chars)
#   NEXTAUTH_SECRET     — Test NextAuth secret
#   VERCEL_TOKEN        — Vercel deployment token (for staging deploy)
#   VERCEL_ORG_ID       — Vercel org ID
#   VERCEL_PROJECT_ID   — Vercel project ID
#   SENTRY_DSN          — Sentry DSN (optional, for error tracking)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.4"

jobs:
  # ─── Stage 1: Quality Gates ────────────────────────────────────────────────
  quality:
    name: Lint + TypeCheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/epowerfix_test?schema=public"
      JWT_SECRET: "ci-test-secret-min-32-characters-long-xxxxxxx"
      NEXTAUTH_SECRET: "ci-test-nextauth-secret-min-32-chars-xxxxxxx"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: epowerfix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─── Setup Bun ─────────────────────────────────────────────────────────
      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # ─── Cache node_modules ────────────────────────────────────────────────
      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      # ─── Install dependencies ──────────────────────────────────────────────
      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      # ─── Generate Prisma Client ────────────────────────────────────────────
      - name: 🗄️ Generate Prisma Client
        run: bun run db:generate

      # ─── Push schema to test database ──────────────────────────────────────
      - name: 🗄️ Push schema to test DB
        run: bun run db:push

      # ─── Lint ──────────────────────────────────────────────────────────────
      - name: 🔍 ESLint
        run: bun run lint
        continue-on-error: true  # Don't block — too many existing warnings

      # ─── Type Check ────────────────────────────────────────────────────────
      - name: 🔍 TypeScript Type Check
        run: npx tsc --noEmit
        continue-on-error: true  # Phase 2: make this blocking after fixing types

      # ─── Unit Tests (Vitest) ───────────────────────────────────────────────
      - name: 🧪 Run Unit Tests
        run: |
          if [ -d "src/**/*.test.ts" ] || [ -f "vitest.config.ts" ]; then
            npx vitest run --reporter=verbose
          else
            echo "No tests found — skipping (Phase 2 will add Vitest)"
          fi

      # ─── Security audit ────────────────────────────────────────────────────
      - name: 🔒 Security audit
        run: bun audit --production
        continue-on-error: true

  # ─── Stage 2: Build Verification ───────────────────────────────────────────
  build:
    name: Build (standalone)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/epowerfix_test?schema=public"
      JWT_SECRET: "ci-test-secret-min-32-characters-long-xxxxxxx"
      NEXTAUTH_SECRET: "ci-test-nextauth-secret-min-32-chars-xxxxxxx"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🗄️ Generate Prisma Client
        run: bun run db:generate

      - name: 🏗️ Build (standalone output)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # ─── Verify build output exists ─────────────────────────────────────────
      - name: ✅ Verify build output
        run: |
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone build successful"
            ls -la .next/standalone/
          else
            echo "❌ Standalone build directory not found"
            exit 1
          fi

      # ─── Upload build artifact ─────────────────────────────────────────────
      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 3

  # ─── Stage 3: Deploy to Staging (only on main branch) ──────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.STAGING_NEXTAUTH_SECRET }}

      - name: 🏥 Health check
        run: |
          sleep 15  # Wait for deployment to be ready
          curl -f https://epowerfix.vercel.app/api/health || exit 1
          echo "✅ Staging is healthy"
