# Nixpacks configuration for Railway
# Uses Node.js 22 (LTS) and Bun

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = ["bun x prisma generate --schema=prisma/schema.prisma", "bun run --cwd apps/api typecheck"]

[start]
cmd = "bun run --cwd apps/api start"
